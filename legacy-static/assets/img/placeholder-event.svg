<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Image atelier placeholder</title>
  <desc id="desc">Visuel temporaire en attendant les photos des ateliers Masoda.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0C1013" />
      <stop offset="50%" stop-color="#291F25" />
      <stop offset="100%" stop-color="#EA8150" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <circle cx="210" cy="130" r="95" fill="#FDD9D3" fill-opacity="0.3" />
  <circle cx="1040" cy="540" r="120" fill="#ECD5B0" fill-opacity="0.22" />
  <text x="600" y="315" text-anchor="middle" fill="#ECD5B0" font-size="58" font-family="Georgia, serif">Les ateliers Masoda</text>
  <text x="600" y="385" text-anchor="middle" fill="#FDD9D3" font-size="32" font-family="Segoe UI, sans-serif">Ajouter ici une photo réelle d'atelier</text>
</svg>
